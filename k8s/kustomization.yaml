apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - external-secrets.yaml
  - ingress.yaml
  - api-deployment.yaml
  - web-deployment.yaml
  - monitoring.yaml

# Image tags are updated by the deploy pipeline via:
#   kustomize edit set image \
#     grocery-tracker-api=ghcr.io/deucesdevops/grocery-tracker-api:<TAG>
#     grocery-tracker-web=ghcr.io/deucesdevops/grocery-tracker-web:<TAG>
images:
  - name: grocery-tracker-api
    newName: ghcr.io/deucesdevops/grocery-tracker-api
    newTag: latest
  - name: grocery-tracker-web
    newName: ghcr.io/deucesdevops/grocery-tracker-web
    newTag: latest

# db-migration-job.yaml is intentionally excluded — it is a one-off Job
# triggered by CI before each rollout, not a long-running managed resource.
