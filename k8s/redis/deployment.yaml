apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: grocery-tracker
  labels:
    app: redis
    app.kubernetes.io/part-of: grocery-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsUser: 999
        fsGroup: 999

      containers:
        - name: redis
          image: redis:7.2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379

          # Require password auth and disable dangerous commands
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--rename-command", "FLUSHALL", "\"\"", "--rename-command", "CONFIG", "\"\""]

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grocery-tracker-secrets
                  key: redis-password

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
