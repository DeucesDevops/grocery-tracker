# Helm values for kube-prometheus-stack
# Install: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#          helm install monitoring prometheus-community/kube-prometheus-stack \
#            -n monitoring --create-namespace \
#            -f k8s/monitoring/prometheus-values.yaml

prometheus:
  prometheusSpec:
    # Retention period for metrics data
    retention: 30d
    retentionSize: "10GB"

    # Scrape all ServiceMonitors and PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Resource limits
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

    # Persistent storage for metrics
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Additional scrape configs for our services
    additionalScrapeConfigs:
      - job_name: "grocery-tracker-api"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["grocery-tracker"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "cluster", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "null"
      routes:
        - matchers:
            - alertname =~ "InfoInhibitor|Watchdog"
          receiver: "null"
        - matchers:
            - severity = critical
          receiver: slack-critical

    receivers:
      - name: "null"
      - name: slack-critical
        slack_configs:
          - api_url: "REPLACE_WITH_SLACK_WEBHOOK_URL"
            channel: "#alerts"
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }} - `{{ .Labels.severity }}`
              *Description:* {{ .Annotations.description }}
              *Details:*
                {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
                {{ end }}
              {{ end }}

# Default rules for cluster health monitoring
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false        # Not accessible in managed EKS
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false   # Not accessible in EKS
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# Grafana is managed separately (see grafana-values.yaml)
grafana:
  enabled: false
