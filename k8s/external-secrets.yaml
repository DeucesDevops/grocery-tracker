# ─────────────────────────────────────────────────────────────────────────────
# External Secrets — pulls values from AWS Secrets Manager into K8s Secrets.
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Create the AWS secret before first deploy:
#   aws secretsmanager create-secret \
#     --name grocery-tracker/production \
#     --secret-string '{
#       "DATABASE_URL": "postgresql://...",
#       "JWT_SECRET": "...",
#       "REDIS_URL": "redis://...",
#       "NEXTAUTH_SECRET": "...",
#       "NEXTAUTH_URL": "https://grocery-tracker.yourdomain.com"
#     }'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: grocery-tracker
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1   # update to match your AWS_REGION

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grocery-tracker-secrets
  namespace: grocery-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: grocery-tracker-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: grocery-tracker/production
        property: DATABASE_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: grocery-tracker/production
        property: JWT_SECRET
    - secretKey: REDIS_URL
      remoteRef:
        key: grocery-tracker/production
        property: REDIS_URL
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: grocery-tracker/production
        property: NEXTAUTH_SECRET
    - secretKey: NEXTAUTH_URL
      remoteRef:
        key: grocery-tracker/production
        property: NEXTAUTH_URL
