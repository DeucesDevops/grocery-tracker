name: CI – Security Quality Gates

on:
  push:
    branches: ["main", "master", "claude/**", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "master"]

env:
  AWS_REGION: us-east-1
  ECR_API_REPO: grocery-tracker-api
  ECR_WEB_REPO: grocery-tracker-web

# Cancel in-flight runs for the same branch when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Gate 1 – Code Linting (ESLint + Hadolint)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: "Gate 1 · Lint (ESLint + Hadolint)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint – Web (Next.js)
        run: pnpm --filter web lint

      - name: ESLint – API (Node.js)
        run: pnpm --filter api lint

      - name: Hadolint – API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api/Dockerfile
          config: .hadolint.yaml

      - name: Hadolint – Web Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/web/Dockerfile
          config: .hadolint.yaml

      - name: Hadolint – Nginx Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: nginx/Dockerfile
          config: .hadolint.yaml

  # ─────────────────────────────────────────────────────────────────
  # Gate 2 – SAST: Static Application Security Testing (Snyk)
  # ─────────────────────────────────────────────────────────────────
  sast:
    name: "Gate 2 · SAST (Snyk)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Snyk – Code scan (SAST)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high --sarif-file-output=snyk-sast.sarif

      - name: Upload SAST results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-sast.sarif

  # ─────────────────────────────────────────────────────────────────
  # Gate 3 – SCA: Software Composition Analysis (npm audit + Snyk)
  # ─────────────────────────────────────────────────────────────────
  sca:
    name: "Gate 3 · SCA (npm audit + Snyk)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit – Web
        run: |
          cd apps/web
          npm audit --audit-level=high --json > ../../npm-audit-web.json || true
          npm audit --audit-level=high

      - name: npm audit – API
        run: |
          cd apps/api
          npm audit --audit-level=high --json > ../../npm-audit-api.json || true
          npm audit --audit-level=high

      - name: Snyk – Open Source dependencies
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --all-projects --severity-threshold=high --sarif-file-output=snyk-sca.sarif

      - name: Upload SCA results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-sca.sarif

  # ─────────────────────────────────────────────────────────────────
  # Gate 4 – IaC Scanning (Checkov)
  # ─────────────────────────────────────────────────────────────────
  iac-scan:
    name: "Gate 4 · IaC Security (Checkov)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Checkov – Terraform scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-terraform.sarif
          soft_fail: false
          skip_check: "CKV_AWS_126" # Adjust as needed

      - name: Checkov – Kubernetes manifests scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s.sarif
          soft_fail: true # Warn only for K8s manifests

      - name: Checkov – Dockerfile scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-dockerfile.sarif
          soft_fail: false

      - name: Upload Checkov results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-terraform.sarif

  # ─────────────────────────────────────────────────────────────────
  # Gate 5 – Build & Container Security (Docker + Trivy)
  # Only runs on pushes to main/master or PR merges
  # ─────────────────────────────────────────────────────────────────
  build-and-scan:
    name: "Gate 5 · Build & Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [sast, sca, iac-scan]
    # Build images on every push to tracked branches and PRs
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request'

    permissions:
      id-token: write   # Required for OIDC auth to AWS
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API_REPO }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPO }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Build API image
      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: ${{ steps.tags.outputs.api_image }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan API image with Trivy
      - name: Trivy – Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.api_image }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy API results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif

      # Build Web image
      - name: Build Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: ${{ steps.tags.outputs.web_image }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan Web image with Trivy
      - name: Trivy – Scan Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.web_image }}
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy Web results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-web.sarif

      # Push images to ECR only when all scans pass and we're on main/master
      - name: Push API image to ECR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker push ${{ steps.tags.outputs.api_image }}
          docker tag ${{ steps.tags.outputs.api_image }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API_REPO }}:latest
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_API_REPO }}:latest

      - name: Push Web image to ECR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          docker push ${{ steps.tags.outputs.web_image }}
          docker tag ${{ steps.tags.outputs.web_image }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPO }}:latest
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_WEB_REPO }}:latest

      # Update image tags in Kubernetes manifests (triggers ArgoCD sync)
      - name: Update K8s manifests with new image tags
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          SHORT_SHA=${{ steps.tags.outputs.short_sha }}
          ECR_REGISTRY=${{ steps.ecr-login.outputs.registry }}

          # Update API deployment image tag
          sed -i "s|image: ${ECR_REGISTRY}/${ECR_API_REPO}:.*|image: ${ECR_REGISTRY}/${ECR_API_REPO}:${SHORT_SHA}|g" \
            k8s/api/deployment.yaml

          # Update Web deployment image tag
          sed -i "s|image: ${ECR_REGISTRY}/${ECR_WEB_REPO}:.*|image: ${ECR_REGISTRY}/${ECR_WEB_REPO}:${SHORT_SHA}|g" \
            k8s/web/deployment.yaml

      - name: Commit and push updated manifests
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api/deployment.yaml k8s/web/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ steps.tags.outputs.short_sha }} [skip ci]"
          git push
