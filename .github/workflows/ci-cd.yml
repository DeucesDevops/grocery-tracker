name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - k8s/kustomization.yaml
  workflow_dispatch:
    inputs:
      skip_migration:
        description: Skip Prisma migration job
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write          # push kustomization.yaml image-tag updates
  packages: write          # push images to GHCR
  security-events: write   # upload Trivy SARIF to GitHub Security tab

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/grocery-tracker-${{ matrix.service }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL }}

  # ─── Trivy Security Scan ──────────────────────────────────────────────────
  trivy-scan:
    name: Trivy scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Scan ${{ matrix.service }} for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/grocery-tracker-${{ matrix.service }}:sha-${{ steps.sha.outputs.short }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ─── Migrate ──────────────────────────────────────────────────────────────
  migrate:
    name: Run Prisma migrations
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: ${{ !inputs.skip_migration }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ vars.AWS_REGION }}" \
            --name   "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Delete previous migration job (if any)
        run: |
          kubectl delete job prisma-migrate \
            --namespace grocery-tracker \
            --ignore-not-found

      - name: Apply migration job with current image
        run: |
          sed "s|grocery-tracker-api:latest|${{ env.REGISTRY }}/${{ github.repository_owner }}/grocery-tracker-api:sha-${{ steps.sha.outputs.short }}|g" \
            k8s/db-migration-job.yaml | kubectl apply -f -

      - name: Wait for migration to complete
        run: |
          kubectl wait job/prisma-migrate \
            --namespace grocery-tracker \
            --for=condition=complete \
            --timeout=120s

      - name: Print migration logs
        if: always()
        run: |
          kubectl logs job/prisma-migrate \
            --namespace grocery-tracker || true

  # ─── GitOps Update ────────────────────────────────────────────────────────
  gitops-update:
    name: Update kustomization & sync ArgoCD
    runs-on: ubuntu-latest
    needs: [trivy-scan, migrate]
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Update image tags in kustomization.yaml
        working-directory: k8s
        run: |
          kustomize edit set image \
            grocery-tracker-api=${{ env.REGISTRY }}/${{ github.repository_owner }}/grocery-tracker-api:sha-${{ steps.sha.outputs.short }} \
            grocery-tracker-web=${{ env.REGISTRY }}/${{ github.repository_owner }}/grocery-tracker-web:sha-${{ steps.sha.outputs.short }}

      - name: Commit and push image-tag update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): bump images to sha-${{ steps.sha.outputs.short }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ vars.AWS_REGION }}" \
            --name   "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Wait for ArgoCD to roll out api
        run: |
          kubectl rollout status deployment/api \
            --namespace grocery-tracker \
            --timeout=300s

      - name: Wait for ArgoCD to roll out web
        run: |
          kubectl rollout status deployment/web \
            --namespace grocery-tracker \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods    --namespace grocery-tracker -o wide
          kubectl get ingress --namespace grocery-tracker
          kubectl get hpa     --namespace grocery-tracker
