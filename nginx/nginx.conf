user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types text/plain application/json application/javascript text/css;

  # Security headers applied to all responses
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Hide Nginx version from responses
  server_tokens off;

  # Rate limiting — 10 requests/second per IP, burst up to 20
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

  upstream api_backend {
    server api:5001;
    keepalive 32;
  }

  upstream web_frontend {
    server web:3005;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Health check endpoint (used by load balancer)
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # API routes — proxy to Node.js backend with rate limiting
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Timeouts
      proxy_connect_timeout 30s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;

      # Disable request body buffering for large payloads
      proxy_request_buffering off;
      client_max_body_size 10m;
    }

    # All other routes — proxy to Next.js frontend
    location / {
      proxy_pass         http://web_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      proxy_connect_timeout 30s;
      proxy_send_timeout    60s;
      proxy_read_timeout    60s;
    }
  }
}
