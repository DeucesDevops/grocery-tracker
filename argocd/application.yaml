# ─────────────────────────────────────────────────────────────────────────────
# ArgoCD Application — tells ArgoCD what repo to watch and where to deploy
#
# SETUP (one time per cluster):
#   1. Install ArgoCD:
#      kubectl create namespace argocd
#      kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#
#   2. Get the initial admin password:
#      kubectl -n argocd get secret argocd-initial-admin-secret \
#        -o jsonpath="{.data.password}" | base64 -d
#
#   3. Access the UI:
#      kubectl port-forward svc/argocd-server -n argocd 8090:443
#      Open: https://localhost:8090
#
#   4. Apply this manifest:
#      kubectl apply -f argocd/application.yaml
#
# After this, ArgoCD watches k8s/ in Git. When the deploy pipeline updates
# kustomization.yaml with a new image tag and pushes, ArgoCD detects the
# commit and rolls out the new version automatically.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grocery-tracker
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/DeucesDevops/grocery-tracker.git
    targetRevision: main
    path: k8s
    kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: grocery-tracker

  syncPolicy:
    automated:
      prune: true       # remove K8s resources deleted from Git
      selfHeal: true    # revert manual cluster changes — Git is the truth
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

  ignoreDifferences:
    # HPA manages replica count at runtime — ArgoCD should not override it
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
